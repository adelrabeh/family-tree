<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شجرة العائلة</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Tahoma;
background:#0d1f35;
color:white;
padding:30px;
text-align:center;
}

button{
padding:10px 18px;
border:none;
background:#4a90d9;
color:white;
border-radius:8px;
cursor:pointer;
}

input{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

.member{
background:#132b46;
padding:10px;
margin:6px;
border-radius:6px;
}

#sync-status{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#132b46;
padding:6px 16px;
border-radius:20px;
font-size:12px;
}

</style>

</head>

<body>

<h1>🌳 شجرة العائلة</h1>

<div>

<input id="name" placeholder="اسم الفرد">

<button onclick="addMember()">إضافة</button>

</div>

<br>

<div id="members"></div>

<div id="sync-status"></div>

<script>

const { createClient } = supabase;

const supabaseClient = createClient(
'https://glryjpqtsahmgnyjawyq.supabase.co',
'sb_publishable_I-yYxgCUa07AOCu47lpXSA_cojuy8e0'
);

function syncStatus(msg){

const el=document.getElementById("sync-status");

if(!el)return;

el.textContent=msg;

setTimeout(()=>{
el.textContent="";
},3000);

}

async function loadMembers(){

try{

const { data, error } = await supabaseClient
.from('members')
.select('*')
.order('id');

if(error){

console.error(error);
syncStatus("خطأ تحميل البيانات");

return;

}

renderMembers(data);

}catch(e){

console.error(e);

}

}

function renderMembers(list){

const box=document.getElementById("members");

box.innerHTML="";

list.forEach(m=>{

const div=document.createElement("div");

div.className="member";

div.innerHTML=m.name;

box.appendChild(div);

});

}

async function addMember(){

const name=document.getElementById("name").value;

if(!name)return;

const id=Math.floor(Math.random()*999999);

const {error}=await supabaseClient
.from('members')
.insert({
id:id,
name:name
});

if(error){

console.error(error);

syncStatus("فشل الحفظ");

return;

}

syncStatus("تم الحفظ");

document.getElementById("name").value="";

loadMembers();

}

window.addEventListener("DOMContentLoaded",()=>{

loadMembers();

});

</script>

</body>

</html>
